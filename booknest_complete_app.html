
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--color-background-tertiary);color:var(--color-text-primary);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
:root{
  --blue:#2563eb;--blue-s:#EFF4FF;--blue-t:#1d4ed8;

@keyframes slr{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}

.sb-logo{padding:14px 14px 12px;border-bottom:0.5px solid var(--color-border-tertiary)}

.cc{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:3px 1px;border-radius:6px;cursor:pointer;font-size:11px;color:var(--color-text-primary);gap:2px}

.cdot{width:3px;height:3px;border-radius:50%}
.auth-wrap{display:flex;height:720px;background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);overflow:hidden}

.auth-form{flex:1;display:flex;align-items:center;justify-content:center;padding:36px 28px}
.inp{width:100%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--r8);padding:8px 11px;font-size:12px;color:var(--color-text-primary);outline:none;font-family:inherit}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.12)}
.sel{width:100%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--r8);padding:8px 11px;font-size:12px;color:var(--color-text-primary);outline:none;font-family:inherit;-webkit-appearance:none}
.ta{width:100%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--r8);padding:8px 11px;font-size:12px;color:var(--color-text-primary);outline:none;font-family:inherit;resize:vertical;min-height:60px;line-height:1.5}
.fl{display:block;font-size:11px;color:var(--color-text-secondary);font-weight:500;margin-bottom:4px}
.ff{margin-bottom:12px}
.over-tint{background:rgba(0,0,0,.35);display:flex;align-items:flex-start;justify-content:center;padding:20px}
.modal-box{background:var(--color-background-primary);border-radius:var(--r16);border:0.5px solid var(--color-border-tertiary);width:100%;max-width:420px;overflow:hidden}
.drawer-box{background:var(--color-background-primary);border-radius:var(--r16) 0 0 var(--r16);width:300px;min-height:600px;border:0.5px solid var(--color-border-tertiary);margin-left:auto}
.sh{scrollbar-width:none}.sh::-webkit-scrollbar{display:none}
table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
td{padding:9px 12px;font-size:12px;border-bottom:0.5px solid var(--color-border-tertiary)}
tr:hover td{background:var(--color-background-secondary)}
.ofr{background:var(--color-background-secondary);border-radius:var(--r8);padding:12px;border-left:2px solid var(--blue)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;text-align:center}
.empty-ic{width:44px;height:44px;border-radius:var(--r12);background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:18px}
</style>

<div id="root"></div>

const TSTR=()=>{const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`};

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const APAL=['#2563eb','#7c3aed','#059669','#d97706','#dc2626','#0891b2','#65a30d','#db2777'];
const aC=h=>{let x=0;for(let i=0;i<h.length;i++){x=h.charCodeAt(i)+((x<<5)-x)}return APAL[Math.abs(x)%APAL.length]};
const ini=n=>n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
const fD=s=>{if(!s)return'';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})};

const rT=iso=>{const s=Math.floor((Date.now()-new Date(iso))/1000);if(s<60)return'just now';if(s<3600)return`${Math.floor(s/60)}m ago`;if(s<86400)return`${Math.floor(s/3600)}h ago`;return'Yesterday'};

function svcCover(svc,h=80){return`<div class="svc-cover" style="height:${h}px;background:linear-gradient(135deg,${svc.color}dd,${svc.color}88)"><span style="font-size:${h*.32}px;line-height:1">${svc.category?.icon||'★'}</span><div class="svc-cat">${svc.category?.name||''}</div></div>`}
function ir(l,v){return`<div class="ir"><span class="ir-l">${l}</span><span class="ir-v">${v}</span></div>`}
function sh(t,a=''){return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:13px;font-weight:500">${t}</div>${a}</div>`}
function prog(val,max,color='#2563eb'){const p=max?Math.round((val/max)*100):0;return`<div class="prog-t"><div class="prog-f" style="width:${p}%;background:${color}"></div></div>`}

function calCells(y,m){
  const fd=new Date(y,m-1,1).getDay(),days=new Date(y,m,0).getDate(),pd=new Date(y,m-1,0).getDate();
  const c=[];for(let i=0;i<fd;i++)c.push({d:pd-fd+1+i,cur:false});
  for(let d=1;d<=days;d++)c.push({d,cur:true});
  while(c.length<35)c.push({d:c.length-days-fd+1,cur:false});return c;
}

        <div style="text-align:center;width:34px;flex-shrink:0"><div style="font-size:15px;font-weight:500;line-height:1">${d.getDate()}</div><div style="font-size:9px;color:var(--color-text-tertiary);text-transform:uppercase">${d.toLocaleDateString('en',{month:'short'})}</div></div>
        <div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:500">${fT(b.start_time)}${b.end_time?`–${fT(b.end_time)}`:''} · ${b.staff_name}</div>${b.notes?`<div style="font-size:10px;color:var(--color-text-tertiary);font-style:italic">"${b.notes}"</div>`:''}</div>
        <div style="text-align:right;flex-shrink:0">${bdg(b.status)}<div style="font-size:11px;font-weight:500;margin-top:2px">${INR(b.amount)}</div></div>
      </div>`;}).join('')}
      <button class="btn-p" style="width:100%;justify-content:center;margin-top:14px" onclick="S.drawerCust=null;S.editBk=null;S.prefDate=null;S.bkModal=true;render()">+ Create Booking</button>
    </div>
  </div>
  </div>`;
}

function renderOfferModal(){
  if(!S.offerModal)return'';
  return`<div style="position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;z-index:50;border-radius:var(--border-radius-lg)" onclick="if(event.target===this){S.offerModal=false;render()}">
  <div class="modal-box fade" style="max-width:380px">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:0.5px solid var(--color-border-tertiary)">
      <div style="font-size:15px;font-weight:500">Post New Offer</div>
      <button class="btn-s" style="padding:4px 8px" onclick="S.offerModal=false;render()"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M2 2l8 8M10 2L2 10"/></svg></button>
    </div>
    <div style="padding:14px 16px">
      <div class="ff"><label class="fl">Title</label><input class="inp" id="off-title" placeholder="Weekend Flash Sale 🎉"></div>
      <div class="ff"><label class="fl">Message</label><textarea class="ta" id="off-body" style="min-height:70px" placeholder="Describe your offer…"></textarea></div>
      <div class="ff"><label class="fl">Valid until (optional)</label><input class="inp" type="date" id="off-valid"></div>
      <div style="background:#EFF4FF;border-radius:var(--r8);padding:10px 12px;font-size:11px;color:#0C447C;margin-bottom:14px">📣 Sent as notification to all linked customers</div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn-s" onclick="S.offerModal=false;render()">Cancel</button>
        <button class="btn-p" onclick="
          const t=D.getElementById('off-title').value||'New Offer';
          const b=D.getElementById('off-body').value||'';
          const v=D.getElementById('off-valid').value;
          const o={id:++nextId,service_id:2,title:t,body:b,valid_until:v||null,is_active:true,service:SVCS[1]};
          S.offers=[o,...S.offers];
          addN({type:'offer_posted',title:'New offer from Rahul\\'s Salon',body:t,related_service_id:2});
          S.offerModal=false;render()
        ">Post Offer 📣</button>
      </div>
    </div>
  </div>
  </div>`;
}

function renderApp(){
  let pageHTML='';
  switch(S.page){
    case 'dashboard':         pageHTML=renderDashboard();break;
    case 'my-services':       pageHTML=renderMyServices();break;
    case 'service-detail':    pageHTML=renderServiceDetail();break;
    case 'calendar':          pageHTML=renderCalendar();break;
    case 'explore':           pageHTML=renderExplore();break;
    case 'latest':            pageHTML=renderLatest();break;
    case 'provider-dashboard':pageHTML=renderProvDash();break;
    case 'manage-bookings':   pageHTML=renderManageBk();break;
    case 'customers':         pageHTML=renderCustomers();break;
    case 'provider-calendar': pageHTML=renderProvCal();break;
    case 'analytics':         pageHTML=renderAnalytics();break;
    case 'offers':            pageHTML=renderOffers();break;
    case 'onboard-service':   pageHTML=renderOnboard();break;
    case 'profile':           pageHTML=renderProfile();break;
    default:                  pageHTML=renderDashboard();
  }
  const overlay=renderBkModal()||renderBkDrawer()||renderSvcDrawer()||renderCustDrawer()||renderOfferModal();
  R.innerHTML=`<div class="shell" style="position:relative">
    <div class="sidebar">${renderSidebar()}</div>
    <div class="main">
      <div class="topbar">${renderTopbar()}</div>
      <div class="scroll"><div style="max-width:960px;margin:0 auto;padding:18px 16px 40px">${pageHTML}</div></div>
    </div>
    ${overlay}
  </div>`;
}
